
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuxeTech | The Future of Premium Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #4f46e5;
        --luxury-dark: #0a0a0b;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa;
        color: #0a0a0b;
        overflow-x: hidden;
      }
      h1, h2, h3, .luxury-serif {
        font-family: 'Playfair Display', serif;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .dark-glass {
        background: rgba(10, 10, 11, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .custom-shadow {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      /* Asegurar que las imágenes tengan un fondo elegante mientras cargan */
      img {
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        min-height: 100%;
        width: 100%;
        display: block;
      }
    </style>
    <script type="importmap">

      }
    }
